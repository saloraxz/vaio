<!DOCTYPE html>
<html>
<head>
  <title></title>
  <style>
  html, body {
    height: 100%;
    margin: 0;
  }

  body {
    background: black;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-family: sans-serif;
  }

  /* Flex wrapper to stack game components neatly */
  .game-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 10px;
  }

  canvas {
    border: 1px solid white;
    max-width: 100%; /* Keeps canvas from overflowing narrow mobile viewports */
    height: auto;
  }

  .back-btn {
    position: fixed;
    top: 15px;
    left: 15px;
    background: #333;
    color: white;
    padding: 0.5rem 1rem;
    text-decoration: none;
    border-radius: 8px;
    font-weight: bold;
    transition: background 0.3s, transform 0.2s;
    border: 1px solid #444;
    font-size: 1rem;
    z-index: 100;
}

.back-btn:hover {
    background: #00ffa3;
    color: #121212;
    transform: translateY(-2px);
}

  #version-footer {
    position: fixed;
    bottom: 15px;
    font-size: 0.7rem;
    color: #555;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .status {
    margin-top: 1.5rem;
    font-size: 0.8rem;
    color: #555;
  }

  /* --- Mobile D-PAD CSS --- */
  .dpad-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: 15px;
    user-select: none;
    -webkit-user-select: none;
  }

  .dpad-row {
    display: flex;
    justify-content: center;
  }

  .dpad-btn {
    width: 60px;
    height: 60px;
    margin: 5px;
    background-color: #222;
    color: white;
    border: 1px solid #444;
    border-radius: 10px;
    font-size: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background-color 0.1s;
  }

  /* Visual feedback flash when touched */
  .dpad-btn:active {
    background-color: #00ffa3;
    color: #121212;
  }

  .dpad-spacer {
    width: 60px;
    height: 60px;
    margin: 5px;
  }

  </style>
</head>
<body>
    <body>
        <div class="game-container">
          <canvas width="400" height="400" id="game"></canvas>
        
          <p><h3 id="scoreBoard"><b>Score: <i>0</i></b></h3></p>
        
          <div class="dpad-container">
              <div class="dpad-row">
                  <button class="dpad-btn" id="btnUp">▲</button>
              </div>
              <div class="dpad-row">
                  <button class="dpad-btn" id="btnLeft">◄</button>
                  <div class="dpad-spacer"></div>
                  <button class="dpad-btn" id="btnRight">►</button>
              </div>
              <div class="dpad-row">
                  <button class="dpad-btn" id="btnDown">▼</button>
              </div>
          </div>
        
          <div class="links">
              <a href="../" class="back-btn">← Back</a>
          </div>
        </div>
        
        <div class="status" id="version-footer">v0.0.0</div>
<script>
var canvas = document.getElementById('game');
var context = canvas.getContext('2d');

var score = 0;

var grid = 14;
var count = 0;
  
var snake = {
  x: 140,
  y: 140,
  
  dx: grid,
  dy: 0,
  
  cells: [],
  
  maxCells: 4
};
var apple = {
  x: 280,
  y: 280
};

// get random whole numbers in a specific range
// https://stackoverflow.com/a/1527820/2124254
function getRandomInt(min, max) {
  return Math.floor(Math.random() * (max - min)) + min;
}

// game loop
    function loop() {
    
    requestAnimationFrame(loop);
    if (++count < 4) {return;}

    count = 0; context.clearRect(0,0,canvas.width,canvas.height);

    snake.x += snake.dx; snake.y += snake.dy;

    if (snake.x < 0) {snake.x = canvas.width - grid;} else if (snake.x >= canvas.width) {snake.x = 0;}
  
    if (snake.y < 0) {snake.y = canvas.height - grid;} else if (snake.y >= canvas.height) {snake.y = 0;}

    snake.cells.unshift({x: snake.x, y: snake.y});

    if (snake.cells.length > snake.maxCells) {snake.cells.pop();}

    context.fillStyle = 'red'; context.fillRect(apple.x, apple.y, grid-1, grid-1);

    for (var i; i < snake.cells; i++){
        if (i === 0){
            context.fillStyle = 'dark green';
        }
        else {
            context.fillStyle = 'green'
        }
    }
    context.fillStyle = 'dark green'; context.fillStyle = 'green'; snake.cells.forEach(function(cell, index) {
    
    context.fillRect(cell.x, cell.y, grid-1, grid-1);  

    // snake ate apple 
    if (cell.x === apple.x && cell.y === apple.y) {
        snake.maxCells++;
        score++;
        document.getElementById("scoreBoard").innerHTML = "<b>Score: <i>" + score + "</i></b>";
        apple.x = getRandomInt(0, 25) * grid; apple.y = getRandomInt(0, 25) * grid;}

        for (var i = index + 1; i < snake.cells.length; i++) { if (cell.x === snake.cells[i].x && cell.y === snake.cells[i].y) {
            score = 0; alert("Game Over | Restarting...");
            document.getElementById("scoreBoard").innerHTML = "<b>Score: <i>" + score + "</i></b>";
            snake.x = 160; snake.y = 160; snake.cells = []; snake.maxCells = 4; snake.dx = grid; snake.dy = 0;
            apple.x = getRandomInt(0, 25) * grid; apple.y = getRandomInt(0, 25) * grid;}}
    });
    }

    document.addEventListener('keydown', function(e) {
    
    if ((e.which === 37 || e.which === 65) && snake.dx === 0) {snake.dx = -grid; snake.dy = 0;}
    else if ((e.which === 38 || e.which === 87) && snake.dy === 0) {snake.dy = -grid; snake.dx = 0;}
    else if ((e.which === 39 || e.which === 68) && snake.dx === 0) {snake.dx = grid; snake.dy = 0;}
    else if ((e.which === 40 || e.which === 83) && snake.dy === 0) {snake.dy = grid; snake.dx = 0;}
    else if (e.which === 32) {alert("Game is paused | Press ok to unpause...");}
    else {console.log(e.which);}});

    function bindTouchControl(elementId, axisType, setDx, setDy) {
        var element = document.getElementById(elementId);
        
        function handleInput() {
            if (axisType === 'x' && snake.dx === 0) {
                snake.dx = setDx;
                snake.dy = setDy;
            } else if (axisType === 'y' && snake.dy === 0) {
                snake.dx = setDx;
                snake.dy = setDy;
            }
        }

        element.addEventListener('touchstart', function(e) {
            e.preventDefault(); 
            handleInput();
        });

        element.addEventListener('click', function() {
            handleInput();
        });
    }

    bindTouchControl('btnLeft',  'x', -grid, 0);
    bindTouchControl('btnRight', 'x', grid, 0);
    bindTouchControl('btnUp',    'y', 0, -grid);
    bindTouchControl('btnDown',  'y', 0, grid);

    requestAnimationFrame(loop);
    </script>
    <script>
    async function loadVersion() {
        try {
            const response = await fetch('https://fedoralap.tail055b0e.ts.net/version.txt');
            if (response.ok) {
                const version = await response.text();
                document.getElementById('version-footer').innerText = 'v' + version.trim();
            }
        } catch (e) {
            console.log("Version file not found");
        }
    }
    loadVersion();
    </script>
</body>
</html>
