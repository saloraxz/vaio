<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ntfy Hub - Vaio</title>
    <style>
        body { font-family: sans-serif; background-color: #121212; color: #e0e0e0; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { text-align: center; background: #1e1e1e; padding: 2rem; border-radius: 15px; border: 1px solid #333; width: 300px; }
        h1 { color: #00ffa3; }
        .links { display: grid; gap: 1rem; margin-top: 1rem; }
        .button { background: #333; color: white; padding: 0.8rem; text-decoration: none; border-radius: 8px; transition: 0.3s; border: 1px solid #444; cursor: pointer; display: block; }
        .button:hover { background: #00ffa3; color: #121212; }
        input { padding: 0.8rem; border-radius: 8px; border: 1px solid #444; background: #222; color: white; width: 80%; margin-top: 1rem; box-sizing: border-box; }
        .loading { opacity: 0.6; cursor: wait; }
    </style>
</head>
<body>
    <div class="container">
        <h1>ntfy Hub</h1>
        <div class="links">
            <a href="#" data-topic="support" class="button smart-link">Support</a>
            <a href="#" data-topic="server_alerts" class="button smart-link">Server Alerts</a>
            <a href="#" data-topic="" class="button smart-link" id="main-ntfy">Open ntfy</a>
        </div>
        
        <input type="text" id="topicSearch" placeholder="Go to topic..." 
               onkeydown="if(event.key === 'Enter') smartRedirect(this.value)">
        
        <p style="font-size: 0.7rem; color: #555; margin-top: 1rem;">Press Enter to search</p>
        <div class="status">
            Connected via Tailscale : Page Version 1.1.9
        </div>
    </div>

    <script>
        const PRIVATE_BASE = "https://fedoralap.tail055b0e.ts.net:8080";
        const PUBLIC_BASE  = "https://fedoralap.tail055b0e.ts.net:8443";

        async function getBestUrl(topic = "") {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 1200);

            try {
                // Ping the private port
                await fetch(PRIVATE_BASE, { mode: 'no-cors', signal: controller.signal });
                return `${PRIVATE_BASE}/${topic}`;
            } catch (e) {
                // Fallback to public
                return `${PUBLIC_BASE}/${topic}`;
            } finally {
                clearTimeout(timeoutId);
            }
        }

        async function smartRedirect(topic, element = null) {
            let originalText = "";
            if (element) {
                element.classList.add('loading');
                originalText = element.innerText;
                element.innerText = "Checking...";
            }

            const targetUrl = await getBestUrl(topic);
            window.location.href = targetUrl;
        }

        // Attach listeners to all "smart-link" buttons
        document.querySelectorAll('.smart-link').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                const topic = btn.getAttribute('data-topic');
                smartRedirect(topic, btn);
            });
        });

        // FIX: The "Back Button" Reset
        window.addEventListener('pageshow', (event) => {
            document.querySelectorAll('.smart-link').forEach(btn => {
                btn.classList.remove('loading');
                // Restore text based on data-topic
                const topic = btn.getAttribute('data-topic');
                if (topic === "") btn.innerText = "Open ntfy";
                else if (topic === "support") btn.innerText = "Support";
                else if (topic === "server_alerts") btn.innerText = "Server Alerts";
            });
        });
    </script>
</body>
</html>
