<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaio Home Server</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background: #1e1e1e;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }
        h1 { color: #00ffa3; margin-bottom: 0.5rem; }
        p { color: #888; margin-bottom: 2rem; }
        .links {
            display: grid;
            gap: 1rem;
        }
        .button {
            background: #333;
            color: white;
            padding: 1rem 2rem;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: background 0.3s, transform 0.2s;
            border: 1px solid #444;
            display: inline-block; /* Added for alignment */
            cursor: pointer;       /* Added for the hand icon */
            font-size: 1rem;       /* Added to match button text size */
        }
        .button:hover {
            background: #00ffa3;
            color: #121212;
            transform: translateY(-2px);
        }
        .status {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Fedora Vaio</h1>
        <p>Tailscale Home Server</p>
        
        <div class="links">
            <a href="#" onclick="smartRedirect(); return false;" class="button">
                Open ntfy
            </a>
            
            <script>
                function smartRedirect() {
                    const btn = event.target;
                    const originalText = btn.innerText;
                    btn.innerText = "Checking connection...";
                
                    const privateUrl = "https://fedoralap.tail055b0e.ts.net:8080";
                    const publicUrl  = "https://fedoralap.tail055b0e.ts.net:8443";
                
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 1500); // Shorter 1.5s is usually better for UX
                
                    fetch(privateUrl, { mode: 'no-cors', signal: controller.signal })
                        .then(() => {
                            window.location.href = privateUrl;
                        })
                        .catch(() => {
                            window.location.href = publicUrl;
                        });
                }
                </script>
            
            <a href="https://fedoralap:9090" class="button">Server Admin (Cockpit)</a>
            <a href="https://fedoralap.tail055b0e.ts.net/blog" class="button">Github Pages</a>
        </div>

        <div class="status">
            Connected via Tailscale : Page Version 1.1.5
        </div>
    </div>
</body>
</html>
