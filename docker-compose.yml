services:
  caddy:
    image: caddy:latest
    container_name: caddy
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:z
      - ./www:/var/www/html:z
      - caddy_data:/data
      - ./certs:/certs:ro,z
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - caddy_net   # <-- added so Caddy can reach nextcloud-app by container name

  ntfy:
    image: binwiederhier/ntfy
    container_name: ntfy
    command: serve
    environment:
      - NTFY_BASE_URL=https://fedoralap.tail055b0e.ts.net
      - NTFY_BEHIND_PROXY=true
      - NTFY_AUTH_FILE=/var/lib/ntfy/user.db
      - NTFY_AUTH_DEFAULT_ACCESS=deny-all
      - NTFY_ATTACHMENT_TOTAL_SIZE_LIMIT=15M
      - NTFY_WEB_BANNER=Welcome! <a href="https://fedoralap.tail055b0e.ts.net" style="color: #00ffa3; font-weight: bold;">[ Back to Home Server ]</a>
    volumes:
      - ./cache:/var/cache/ntfy
      - ./etc:/etc/ntfy
      - ./auth:/var/lib/ntfy
    restart: unless-stopped
    networks:
      - caddy_net   # <-- added so Caddy can reach ntfy by container name too

  git-sync:
    image: registry.k8s.io/git-sync/git-sync:v4.2.3
    container_name: git-sync
    volumes:
      - ./www:/tmp/git:Z
    environment:
      - GITSYNC_REPO=https://github.com/saloraxz/vaio
      - GITSYNC_REF=main
      - GITSYNC_ROOT=/tmp/git
      - GITSYNC_LINK=current
      - GITSYNC_PERIOD=60s
    restart: unless-stopped

volumes:
  caddy_data:

networks:
  caddy_net:
    driver: bridge   # Caddy owns this network; nextcloud compose joins it as external