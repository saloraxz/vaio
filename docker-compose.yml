services:
  caddy:
    image: caddy:latest
    container_name: caddy
    command: caddy run --config /srv/repo/current/Caddyfile --adapter caddyfile
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /home/laperic/git-sync-root:/srv/repo:z
      - caddy_data:/data
      - /home/laperic/ntfy/certs:/certs:ro,z
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - caddy_net

  ntfy:
    image: binwiederhier/ntfy
    container_name: ntfy
    command: serve
    environment:
      - NTFY_BASE_URL=https://fedoralap.tail055b0e.ts.net
      - NTFY_BEHIND_PROXY=true
      - NTFY_AUTH_FILE=/var/lib/ntfy/user.db
      - NTFY_AUTH_DEFAULT_ACCESS=deny-all
      - NTFY_ATTACHMENT_TOTAL_SIZE_LIMIT=15M
    volumes:
      - /home/laperic/ntfy/cache:/var/cache/ntfy
      - /home/laperic/ntfy/etc:/etc/ntfy
      - /home/laperic/ntfy/auth:/var/lib/ntfy
    restart: unless-stopped
    networks:
      - caddy_net

  git-sync:
    image: registry.k8s.io/git-sync/git-sync:v4.2.3
    container_name: git-sync
    volumes:
      - /home/laperic/git-sync-root:/tmp/git:Z
    environment:
      - GITSYNC_REPO=https://github.com/saloraxz/vaio
      - GITSYNC_REF=main
      - GITSYNC_ROOT=/tmp/git
      - GITSYNC_LINK=current
      - GITSYNC_PERIOD=60s
    restart: unless-stopped

volumes:
  caddy_data:

networks:
  caddy_net:
    driver: bridge
    name: caddy_net