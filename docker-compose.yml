services:
  caddy:
    image: caddy:latest
    container_name: caddy
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:z
      - ./www:/var/www/html:z
      - caddy_data:/data
      - ./certs:/certs:ro,z
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
  
  ntfy:
    image: binwiederhier/ntfy
    container_name: ntfy
    command: serve
    environment:
      - NTFY_BASE_URL=https://fedoralap.tail055b0e.ts.net
      - NTFY_BEHIND_PROXY=true
      - NTFY_AUTH_FILE=/var/lib/ntfy/user.db
      - NTFY_AUTH_DEFAULT_ACCESS=deny-all
      - NTFY_ATTACHMENT_TOTAL_SIZE_LIMIT=15M
      - NTFY_WEB_BANNER=Welcome! <a href="https://fedoralap.tail055b0e.ts.net" style="color: #00ffa3; font-weight: bold;">[ Back to Home Server ]</a>
    volumes:
      - ./cache:/var/cache/ntfy
      - ./etc:/etc/ntfy
      - ./auth:/var/lib/ntfy
    restart: unless-stopped

  git-sync:
    image: registry.k8s.io/git-sync/git-sync:v4.2.3
    container_name: git-sync
    volumes:
      - ./www:/tmp/git:Z
    environment:
      - GITSYNC_REPO=https://github.com/saloraxz/vaio
      - GITSYNC_REF=main
      - GITSYNC_ROOT=/tmp/git
      - GITSYNC_LINK=current
      - GITSYNC_PERIOD=60s
    restart: unless-stopped

  # --- ADDED NEXTCLOUD DATABASE ---
  nextcloud-db:
    image: mariadb:10.11
    container_name: nextcloud-db
    command: --transaction-isolation=READ-COMMITTED --log-bin=binlog --binlog-format=ROW
    restart: unless-stopped
    volumes:
      - nextcloud_db:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=your_root_password
      - MYSQL_PASSWORD=your_nc_password
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud

  # --- ADDED NEXTCLOUD APP ---
  nextcloud-app:
    image: nextcloud:latest
    container_name: nextcloud-app
    restart: unless-stopped
    # No ports directive needed here! Caddy talks to it internally on port 80.
    volumes:
      # Binds your external Seagate drive directly to Nextcloud
      - ~/nextcloud:/var/www/html:z
    environment:
      - MYSQL_PASSWORD=your_nc_password
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_HOST=nextcloud-db
    depends_on:
      - nextcloud-db

volumes:
  caddy_data:
  nextcloud_db: